<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./CSS/index.css" />
  </head>
  <body>
    <div class="crud">
      <!-- head -->
      <div class="head">
        <h2>Crud</h2>
        <p>PRODUCT MANAGEMENT SYSTEM</p>
      </div>
      <!-- //head// -->

      <!-- inputs -->
      <div class="input">
        <input type="text" id="title" placeholder="Title" />
        <div class="pric">
          <input
            onkeyup="getTotal()"
            type="number"
            id="price"
            placeholder="Price"
          />
          <input
            onkeyup="getTotal()"
            type="number"
            id="taxes"
            placeholder="Taxes"
          />
          <input
            onkeyup="getTotal()"
            type="number"
            id="ads"
            placeholder="Ads"
          />
          <input
            onkeyup="getTotal()"
            type="number"
            id="discount"
            placeholder="Discount"
          />
          <small id="total"> </small>
        </div>
        <input type="number" id="count" placeholder="Count" />
        <input type="text" id="category" placeholder="Category" />
        <button id="submit">Create</button>
      </div>
      <!-- //inputs// -->

      <!-- outputs -->
      <div class="output">
        <div class="seacrchblock">
          <input
            onkeyup="searchData(this.value)"
            type="text"
            id="search"
            placeholder="Search"
          />
          <div id="div" class="btnSearch">
            <button onclick="getSearchMood(this.id)" id="SearchTitle">
              Search By title
            </button>
            <button onclick="getSearchMood(this.id)" id="SearchCategory">
              Search By Category
            </button>
          </div>
        </div>
        <div id="DeleteAll"></div>
        <table>
          <tr>
            <th>id</th>
            <th>title</th>
            <th>Price</th>

            <th>taxes</th>
            <th>ads</th>
            <th>discount</th>
            <th>Total</th>
            <th>category</th>
            <th>update</th>
            <th>Delete</th>
          </tr>

          <tbody id="tbody">
            <!-- <tr>
              <td>1</td>
              <td>samsung</td>
              <td>200$</td>
              <td>100</td>
              <td>30$</td>
              <td>500$</td>
              <td>2100</td>
              <td>iphone</td>
              <td><button id="update">update</button></td>
              <td><button id="delete">delete</button></td>
            </tr>
        -->
          </tbody>
        </table>
      </div>
      <!-- //outputs// -->
    </div>
 <main>
     
      <div style="height: 2000"></div>
      <a href="#" class="back-to-top">Back to Top</a>
    </main>
    <script src="./js/index.js"></script>
  </body>
</html>
